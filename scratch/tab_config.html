<section id="tab-config" class="tab-content hidden space-y-6">
                <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">

                    <!-- AJUSTES CAMBIARIOS -->
                    <div
                        class="bg-white dark:bg-slate-900 p-5 rounded-2xl border border-slate-200 dark:border-slate-800 space-y-4 shadow-sm">
                        <h3
                            class="font-bold text-slate-850 dark:text-slate-200 flex items-center gap-2 text-xs uppercase tracking-wider">
                            <i class="fa-solid fa-dollar-sign text-indigo-500"></i> Parámetros Monetarios (Venezuela)
                        </h3>

                        <div class="space-y-4">
                            <div>
                                <label class="text-xs text-slate-500 dark:text-slate-400 block mb-1">Tasa Oficial BCV
                                    (Bs. por Dólar)</label>
                                <div class="relative">
                                    <input onchange="updateRates()" id="input-bcv" type="number" step="0.01"
                                        value="60.00"
                                        class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-800 rounded-xl pl-4 pr-12 py-2.5 text-sm font-mono focus:outline-none focus:border-indigo-500 transition text-slate-900 dark:text-slate-200">
                                    <span
                                        class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs font-bold">VES</span>
                                </div>
                            </div>

                            <div>
                                <label class="text-xs text-slate-500 dark:text-slate-400 block mb-1">Factor de Cobertura
                                    Cambiaria ($_ajustado / $_divisa)</label>
                                <div class="relative">
                                    <input onchange="updateRates()" id="input-factor" type="number" step="0.01"
                                        value="1.40"
                                        class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-800 rounded-xl pl-4 pr-12 py-2.5 text-sm font-mono focus:outline-none focus:border-indigo-500 transition text-slate-900 dark:text-slate-200">
                                    <span
                                        class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs font-bold">X</span>
                                </div>
                                <p class="text-[9px] text-slate-400 dark:text-slate-500 mt-1 leading-normal">Calculado
                                    de forma dinámica: (Tasa Mercado / Tasa Oficial BCV). Ej: 84.00 / 60.00 = 1.40</p>
                            </div>

                            <!-- GOOGLE SHEETS / BINANCE INTEGRATION -->
                            <div
                                class="bg-slate-50 dark:bg-slate-950 p-4 rounded-xl border border-slate-200 dark:border-slate-850 space-y-3">
                                <span
                                    class="text-xs font-bold block text-indigo-600 dark:text-indigo-400 uppercase tracking-wide">Motor
                                    de Integración API Configurable</span>

                                <div>
                                    <label
                                        class="text-[9px] text-slate-500 dark:text-slate-400 block mb-1 uppercase font-bold">API
                                        URL (Google App Script / Endpoint Externo)</label>
                                    <input type="text" value="https://script.google.com/macros/s/AKfycb...exec"
                                        class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg px-3 py-1.5 text-xs font-mono text-slate-500 dark:text-slate-400 focus:outline-none">
                                </div>

                                <div class="grid grid-cols-2 gap-2">
                                    <div>
                                        <label
                                            class="text-[9px] text-slate-500 dark:text-slate-400 block mb-1 uppercase font-bold">Método
                                            HTTP</label>
                                        <input type="text" readonly value="POST"
                                            class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg px-3 py-1.5 text-xs text-center font-bold font-mono text-slate-400 dark:text-slate-500">
                                    </div>
                                    <div>
                                        <label
                                            class="text-[9px] text-slate-500 dark:text-slate-400 block mb-1 uppercase font-bold">JSON
                                            Selector Path</label>
                                        <input type="text" value="data.prices.USDT"
                                            class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg px-3 py-1.5 text-xs font-mono text-slate-500 dark:text-slate-400">
                                    </div>
                                </div>

                                <button onclick="simulateSync()"
                                    class="w-full bg-indigo-50 hover:bg-indigo-100 dark:bg-indigo-650/15 dark:hover:bg-indigo-600/30 text-indigo-600 dark:text-indigo-400 border border-indigo-100 dark:border-indigo-500/25 text-xs py-2 rounded-lg transition font-bold flex items-center justify-center gap-2 shadow-sm">
                                    <i class="fa-solid fa-rotate"></i> Sincronizar Tasas Ahora
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- REGLAS DE PRECIOS Y AUDITORÍA DE TASAS -->
                    <div class="space-y-6">
                        <!-- RENTABILIDAD CARD -->
                        <div
                            class="bg-white dark:bg-slate-900 p-5 rounded-2xl border border-slate-200 dark:border-slate-800 space-y-4 shadow-sm">
                            <h3
                                class="font-bold text-slate-850 dark:text-slate-200 flex items-center gap-2 text-xs uppercase tracking-wider">
                                <i class="fa-solid fa-calculator text-indigo-500"></i> Lógica de Rentabilidad Global
                            </h3>

                            <div class="space-y-3">
                                <div>
                                    <label class="text-xs text-slate-500 dark:text-slate-400 block mb-1">Método de
                                        Utilidad Predeterminado</label>
                                    <select
                                        class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-800 rounded-xl px-3 py-2 text-xs text-slate-800 dark:text-slate-300 focus:outline-none font-semibold">
                                        <option value="directo">Método Directo (Markup - Costo x Factor)</option>
                                        <option value="real">Método Real (Margin - Margen Real sobre Venta)</option>
                                    </select>
                                </div>

                                <div class="grid grid-cols-2 gap-3">
                                    <div>
                                        <label class="text-xs text-slate-500 dark:text-slate-400 block mb-1">Margen
                                            Global (%)</label>
                                        <input type="number" value="30"
                                            class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-800 rounded-xl px-3 py-2 text-xs font-mono text-slate-900 dark:text-slate-200">
                                    </div>
                                    <div>
                                        <label class="text-xs text-slate-500 dark:text-slate-400 block mb-1">Descuento
                                            Global (%)</label>
                                        <input type="number" value="5"
                                            class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-800 rounded-xl px-3 py-2 text-xs font-mono text-slate-900 dark:text-slate-200">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- HISTÓRICO DE AUDITORÍA DE TASAS -->
                        <div
                            class="bg-white dark:bg-slate-900 p-5 rounded-2xl border border-slate-200 dark:border-slate-800 space-y-3 shadow-sm">
                            <h3
                                class="font-bold text-slate-850 dark:text-slate-200 flex items-center gap-2 text-xs uppercase tracking-wider">
                                <i class="fa-solid fa-history text-orange-500"></i> Histórico Auditoría Cambiaria
                            </h3>
                            <div
                                class="overflow-y-auto max-h-48 border border-slate-200 dark:border-slate-800 rounded-xl bg-slate-50 dark:bg-slate-950 p-2">
                                <table class="w-full text-left text-[10px] font-mono">
                                    <thead>
                                        <tr
                                            class="text-slate-500 border-b border-slate-200 dark:border-slate-800 uppercase">
                                            <th class="pb-1">Fecha/Hora</th>
                                            <th class="pb-1 text-right">BCV (Bs)</th>
                                            <th class="pb-1 text-center">F. Cob.</th>
                                            <th class="pb-1 text-right text-indigo-600 dark:text-indigo-400">Ajust. (Bs)
                                            </th>
                                        </tr>
                                    </thead>
                                    <tbody id="rates-audit-tbody"
                                        class="divide-y divide-slate-100 dark:divide-slate-800/50 text-slate-800 dark:text-slate-300">
                                        <!-- Dynamic entries of rates modifications -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                </div>
            </section>
