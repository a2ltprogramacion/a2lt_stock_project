<section id="tab-contactos" class="tab-content hidden space-y-6">
                <div class="flex justify-between items-center">
                    <div>
                        <h2 class="text-xl font-bold text-slate-900 dark:text-white">Directorio de Negocios</h2>
                        <p class="text-xs text-slate-500 dark:text-slate-400">Administra tus bases de datos de clientes
                            y registros históricos de proveedores.</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="openContactModal('CLIENTE')"
                            class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs px-4 py-2.5 rounded-xl transition flex items-center gap-1.5 shadow">
                            <i class="fa-solid fa-user-plus"></i> Registrar Cliente
                        </button>
                        <button onclick="openContactModal('PROVEEDOR')"
                            class="bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 border border-slate-300 dark:border-slate-750 font-bold text-xs px-4 py-2.5 rounded-xl transition flex items-center gap-1.5 shadow-sm">
                            <i class="fa-solid fa-truck-field"></i> Registrar Proveedor
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <!-- CLIENTES LIST -->
                    <div
                        class="bg-white dark:bg-slate-900 p-5 rounded-2xl border border-slate-200 dark:border-slate-800 space-y-4 shadow-sm">
                        <div
                            class="flex justify-between items-center border-b border-slate-100 dark:border-slate-800 pb-2">
                            <h3
                                class="font-bold text-slate-800 dark:text-slate-200 text-xs uppercase tracking-wider flex items-center gap-2">
                                <i class="fa-solid fa-users text-indigo-500"></i> Clientes para Marketing
                            </h3>
                            <span class="text-xs text-slate-500 dark:text-slate-400" id="client-count-lbl">Total:
                                1</span>
                        </div>
                        <div class="overflow-x-auto h-96 overflow-y-auto">
                            <table class="w-full text-left text-xs">
                                <thead>
                                    <tr
                                        class="text-slate-500 uppercase border-b border-slate-200 dark:border-slate-800">
                                        <th class="pb-2">Cédula / RIF</th>
                                        <th class="pb-2">Nombre Cliente</th>
                                        <th class="pb-2">Teléfono</th>
                                        <th class="pb-2">Red Social</th>
                                        <th class="pb-2 text-right">Acción</th>
                                    </tr>
                                </thead>
                                <tbody id="contacts-clients-tbody"
                                    class="divide-y divide-slate-100 dark:divide-slate-800 font-mono text-[11px] text-slate-800 dark:text-slate-300">
                                    <!-- Dynamic rows -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- PROVEEDORES LIST -->
                    <div
                        class="bg-white dark:bg-slate-900 p-5 rounded-2xl border border-slate-200 dark:border-slate-800 space-y-4 shadow-sm">
                        <div
                            class="flex justify-between items-center border-b border-slate-100 dark:border-slate-800 pb-2">
                            <h3
                                class="font-bold text-slate-800 dark:text-slate-200 text-xs uppercase tracking-wider flex items-center gap-2">
                                <i class="fa-solid fa-truck-field text-indigo-500"></i> Control de Proveedores
                            </h3>
                            <span class="text-xs text-slate-500 dark:text-slate-400" id="supplier-count-lbl">Total:
                                1</span>
                        </div>
                        <div class="overflow-x-auto h-96 overflow-y-auto">
                            <table class="w-full text-left text-xs">
                                <thead>
                                    <tr
                                        class="text-slate-500 uppercase border-b border-slate-200 dark:border-slate-800">
                                        <th class="pb-2">RIF / ID</th>
                                        <th class="pb-2">Razón Social</th>
                                        <th class="pb-2">Teléfono</th>
                                        <th class="pb-2">Estatus</th>
                                        <th class="pb-2 text-right">Acción</th>
                                    </tr>
                                </thead>
                                <tbody id="contacts-suppliers-tbody"
                                    class="divide-y divide-slate-100 dark:divide-slate-800 font-mono text-[11px] text-slate-800 dark:text-slate-300">
                                    <!-- Dynamic rows -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>
