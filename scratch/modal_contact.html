<div id="modal-contact"
        class="hidden fixed inset-0 bg-slate-950/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div
            class="bg-white dark:bg-slate-850 border border-slate-300 dark:border-slate-700 max-w-lg w-full rounded-2xl shadow-2xl overflow-hidden overflow-y-auto max-h-[90vh]">
            <div class="p-6 space-y-4">
                <div class="flex justify-between items-center border-b border-slate-100 dark:border-slate-700 pb-2">
                    <h3 class="font-bold text-md text-slate-850 dark:text-slate-100 flex items-center gap-2"
                        id="contact-modal-title">
                        <i class="fa-solid fa-user-plus text-indigo-500"></i> Registrar Contacto
                    </h3>
                    <button onclick="closeContactModal()"
                        class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"><i
                            class="fa-solid fa-xmark text-lg"></i></button>
                </div>

                <div class="space-y-3 text-xs">
                    <input type="hidden" id="form-c-type">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] text-slate-500 dark:text-slate-400 uppercase font-bold block mb-1"
                                id="contact-id-lbl">Cédula / RIF</label>
                            <input id="form-c-id" type="text" placeholder="Ej. V-26412411 o J-41241"
                                class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg p-2 text-xs text-slate-900 dark:text-slate-200 font-mono font-medium focus:outline-none focus:border-indigo-500">
                        </div>
                        <div>
                            <label
                                class="text-[10px] text-slate-500 dark:text-slate-400 uppercase font-bold block mb-1">Nombre
                                Completo / Razón Social</label>
                            <input id="form-c-name" type="text" placeholder="Ej. Corporación Metal-X C.A."
                                class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg p-2 text-xs text-slate-900 dark:text-slate-200 focus:outline-none focus:border-indigo-500 font-medium">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <div>
                            <label
                                class="text-[10px] text-slate-500 dark:text-slate-400 uppercase font-bold block mb-1">Teléfono
                                o Canal Comercial</label>
                            <input id="form-c-phone" type="text" placeholder="Ej. 0412.186.92.11"
                                class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg p-2 text-xs text-slate-900 dark:text-slate-200 focus:outline-none focus:border-indigo-500 font-medium">
                        </div>
                        <div>
                            <label
                                class="text-[10px] text-slate-500 dark:text-slate-400 uppercase font-bold block mb-1">Correo
                                Electrónico</label>
                            <input id="form-c-email" type="email" placeholder="Ej. info@empresa.com"
                                class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg p-2 text-xs text-slate-900 dark:text-slate-200 font-mono font-medium focus:outline-none focus:border-indigo-500">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <div>
                            <label
                                class="text-[10px] text-slate-500 dark:text-slate-400 uppercase font-bold block mb-1">Redes
                                Sociales (IG/Tiktok)</label>
                            <input id="form-c-social" type="text" placeholder="Ej. @metal_x"
                                class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg p-2 text-xs text-slate-900 dark:text-slate-200 font-mono font-medium focus:outline-none focus:border-indigo-500">
                        </div>
                        <div>
                            <label
                                class="text-[10px] text-slate-500 dark:text-slate-400 uppercase font-bold block mb-1">Dirección
                                Física Completa</label>
                            <input id="form-c-address" type="text" placeholder="Ej. Zona Industrial San Diego, Cl. 4"
                                class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg p-2 text-xs text-slate-900 dark:text-slate-200 focus:outline-none focus:border-indigo-500 font-medium">
                        </div>
                    </div>

                    <div>
                        <label
                            class="text-[10px] text-slate-500 dark:text-slate-400 uppercase font-bold block mb-1">Observaciones
                            / Comentarios Internos</label>
                        <textarea id="form-c-notes" rows="3"
                            placeholder="Indique de forma libre observaciones para marketing, histórico o condiciones..."
                            class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg p-2 text-xs text-slate-900 dark:text-slate-200 focus:outline-none focus:border-indigo-500 resize-none h-24 font-medium"></textarea>
                    </div>
                </div>
            </div>

            <!-- MODAL BUTTONS -->
            <div
                class="bg-slate-100 dark:bg-slate-900 px-6 py-4 border-t border-slate-200 dark:border-slate-750 flex justify-end gap-3">
                <button onclick="closeContactModal()"
                    class="bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 border border-slate-300 dark:border-slate-700 px-4 py-2 rounded-xl text-xs font-semibold transition">
                    Cancelar
                </button>
                <button onclick="saveContact()"
                    class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2 rounded-xl text-xs font-semibold transition shadow-md shadow-indigo-600/10">
                    Guardar Contacto
                </button>
            </div>
        </div>
    </div>
