<div id="modal-contact-details"
        class="hidden fixed inset-0 bg-slate-950/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div
            class="bg-white dark:bg-slate-850 border border-slate-300 dark:border-slate-700 max-w-md w-full rounded-2xl shadow-2xl overflow-hidden">
            <div class="p-6 space-y-4">
                <div class="flex justify-between items-center border-b border-slate-100 dark:border-slate-700 pb-2">
                    <h3 class="font-bold text-md text-indigo-600 dark:text-indigo-400 flex items-center gap-2">
                        <i class="fa-solid fa-id-card"></i> Ficha Informativa del Contacto
                    </h3>
                    <button onclick="closeContactDetailsModal()"
                        class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"><i
                            class="fa-solid fa-xmark text-lg"></i></button>
                </div>

                <div class="space-y-3 text-xs leading-relaxed">
                    <div
                        class="bg-slate-50 dark:bg-slate-900 p-3 rounded-xl border border-slate-200 dark:border-slate-800">
                        <span class="text-[9px] uppercase font-bold text-slate-400 dark:text-slate-500 block">Nombre /
                            Razón Social</span>
                        <span id="detail-c-name" class="font-bold text-slate-800 dark:text-slate-200 text-sm">--</span>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div
                            class="bg-slate-50 dark:bg-slate-900 p-2 rounded-xl border border-slate-200 dark:border-slate-800">
                            <span
                                class="text-[9px] uppercase font-bold text-slate-400 dark:text-slate-500 block">Identificación
                                (RIF/C.I)</span>
                            <span id="detail-c-id"
                                class="font-mono text-slate-700 dark:text-slate-300 font-bold">--</span>
                        </div>
                        <div
                            class="bg-slate-50 dark:bg-slate-900 p-2 rounded-xl border border-slate-200 dark:border-slate-800">
                            <span
                                class="text-[9px] uppercase font-bold text-slate-400 dark:text-slate-500 block">Tipo</span>
                            <span id="detail-c-type" class="text-slate-700 dark:text-slate-300 font-semibold">--</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div
                            class="bg-slate-50 dark:bg-slate-900 p-2 rounded-xl border border-slate-200 dark:border-slate-800">
                            <span
                                class="text-[9px] uppercase font-bold text-slate-400 dark:text-slate-500 block">Teléfono</span>
                            <span id="detail-c-phone" class="text-slate-700 dark:text-slate-300">--</span>
                        </div>
                        <div
                            class="bg-slate-50 dark:bg-slate-900 p-2 rounded-xl border border-slate-200 dark:border-slate-800">
                            <span class="text-[9px] uppercase font-bold text-slate-400 dark:text-slate-500 block">Red
                                Social</span>
                            <span id="detail-c-social" class="font-mono text-indigo-600 dark:text-indigo-400">--</span>
                        </div>
                    </div>

                    <div
                        class="bg-slate-50 dark:bg-slate-900 p-3 rounded-xl border border-slate-200 dark:border-slate-800">
                        <span
                            class="text-[9px] uppercase font-bold text-slate-400 dark:text-slate-500 block">Dirección</span>
                        <span id="detail-c-address" class="text-slate-700 dark:text-slate-300">--</span>
                    </div>

                    <div
                        class="bg-slate-50 dark:bg-slate-900 p-3 rounded-xl border border-slate-200 dark:border-slate-800">
                        <span
                            class="text-[9px] uppercase font-bold text-slate-400 dark:text-slate-500 block">Observaciones
                            y Comentarios</span>
                        <p id="detail-c-notes" class="text-slate-600 dark:text-slate-400 whitespace-pre-wrap">--</p>
                    </div>
                </div>
            </div>
