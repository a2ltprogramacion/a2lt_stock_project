<section id="tab-movimientos" class="tab-content hidden space-y-6">
                <!-- ROW 1: ASIENTO MANUAL REORGANIZADO -->
                <div
                    class="bg-white dark:bg-slate-900 p-5 rounded-2xl border border-slate-200 dark:border-slate-800 space-y-4 shadow-sm">
                    <h3
                        class="font-bold text-slate-800 dark:text-slate-200 text-xs uppercase tracking-wider flex items-center gap-2">
                        <i class="fa-solid fa-file-pen text-indigo-500"></i> Registro de Asiento Manual Kárdex
                    </h3>
                    <div
                        class="grid grid-cols-1 md:grid-cols-12 gap-4 bg-slate-50 dark:bg-slate-950 p-4 rounded-xl border border-slate-200 dark:border-slate-850 text-xs">

                        <div class="md:col-span-4">
                            <label
                                class="text-[10px] text-slate-500 dark:text-slate-400 block mb-1 uppercase font-bold">Producto
                                / Artículo</label>
                            <select id="kardex-product"
                                class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg p-2 text-xs text-slate-900 dark:text-slate-200 focus:outline-none focus:border-indigo-500 font-semibold">
                                <!-- Populated dynamically from JS -->
                            </select>
                        </div>
                        <div class="md:col-span-3">
                            <label
                                class="text-[10px] text-slate-500 dark:text-slate-400 block mb-1 uppercase font-bold">Almacén
                                Destino/Origen</label>
                            <select id="kardex-warehouse"
                                class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg p-2 text-xs text-slate-900 dark:text-slate-200 focus:outline-none focus:border-indigo-500 font-semibold">
                                <option value="San Diego">San Diego (Default)</option>
                                <option value="Valencia">Valencia (Norte)</option>
                            </select>
                        </div>
                        <div class="md:col-span-3">
                            <!-- Naranja para Entradas (+), Rojo/Rosa para Salidas (-) -->
                            <label
                                class="text-[10px] text-slate-500 dark:text-slate-400 block mb-1 uppercase font-bold">Tipo
                                Operación</label>
                            <select id="kardex-type"
                                class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg p-2 text-xs text-slate-900 dark:text-slate-200 focus:outline-none focus:border-indigo-500 font-bold">
                                <option class="text-emerald-600 font-bold" value="ENTRADA">Entrada (+)</option>
                                <option class="text-rose-600 font-bold" value="SALIDA">Salida (-)</option>
                            </select>
                        </div>
                        <div class="md:col-span-2">
                            <label
                                class="text-[10px] text-slate-500 dark:text-slate-400 block mb-1 uppercase font-bold">Cantidad</label>
                            <input id="kardex-qty" type="number" min="1" value="5"
                                class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg p-2 text-xs text-slate-900 dark:text-slate-200 focus:outline-none focus:border-indigo-500 font-mono text-center font-bold">
                        </div>

                        <!-- MOTIVO EN LÍNEA INFERIOR (MULTILÍNEA DETALLADA) -->
                        <div class="md:col-span-10 mt-1">
                            <label
                                class="text-[10px] text-slate-500 dark:text-slate-400 block mb-1 uppercase font-bold">Motivo
                                o Concepto Detallado (Obligatorio para Auditoría)</label>
                            <textarea id="kardex-concept" rows="2"
                                placeholder="Escriba de forma detallada y explícita el concepto del ajuste físico, compra o merma..."
                                class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg p-2 text-xs text-slate-900 dark:text-slate-200 focus:outline-none focus:border-indigo-500 resize-none font-medium"></textarea>
                        </div>

                        <div class="md:col-span-2 flex items-end">
                            <button onclick="registerManualMovement()"
                                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs py-2.5 rounded-lg transition flex items-center justify-center gap-1.5 shadow-md">
                                <i class="fa-solid fa-floppy-disk"></i> Registrar Asiento
                            </button>
                        </div>
                    </div>
                </div>

                <!-- HISTÓRICO CON FILTROS COMBINADOS -->
                <div
                    class="bg-white dark:bg-slate-900 p-5 rounded-2xl border border-slate-200 dark:border-slate-800 space-y-4 shadow-sm">
                    <div
                        class="flex flex-wrap justify-between items-center pb-3 border-b border-slate-100 dark:border-slate-800 gap-4">
                        <h3
                            class="font-bold text-slate-800 dark:text-slate-200 text-xs uppercase tracking-wider flex items-center gap-2">
                            <i class="fa-solid fa-clock-rotate-left text-indigo-500"></i> Histórico de Transacciones
                            Auditables
                        </h3>
                        <span class="text-xs text-slate-500 dark:text-slate-400">Total movimientos: <strong
                                id="kardex-count"
                                class="text-slate-850 dark:text-slate-200 font-mono font-bold">3</strong></span>
                    </div>

                    <!-- BUSCADOR COMBINADO (KÁRDEX) -->
                    <div
                        class="grid grid-cols-1 md:grid-cols-5 gap-3 bg-slate-50 dark:bg-slate-950 p-4 rounded-xl border border-slate-200 dark:border-slate-850 text-xs">
                        <div class="md:col-span-1">
                            <label
                                class="text-[10px] text-slate-500 dark:text-slate-400 block mb-1 uppercase font-bold">Filtrar
                                por SKU o Término</label>
                            <input type="text" id="filter-kardex-term" onkeyup="filterKardex()"
                                placeholder="Ej. F012..."
                                class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg p-2 text-xs text-slate-900 dark:text-slate-200 focus:outline-none">
                        </div>
                        <div class="md:col-span-1">
                            <label
                                class="text-[10px] text-slate-500 dark:text-slate-400 block mb-1 uppercase font-bold">Almacén</label>
                            <select id="filter-kardex-warehouse" onchange="filterKardex()"
                                class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg p-2 text-xs text-slate-900 dark:text-slate-200 focus:outline-none font-semibold">
                                <option value="all">Todos los Almacenes</option>
                                <option value="San Diego">San Diego</option>
                                <option value="Valencia">Valencia</option>
                            </select>
                        </div>
                        <div class="md:col-span-1.5">
                            <label
                                class="text-[10px] text-slate-500 dark:text-slate-400 block mb-1 uppercase font-bold">Desde
                                Fecha (Día A)</label>
                            <input type="date" id="filter-kardex-date-from" onchange="filterKardex()"
                                class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg p-2 text-xs text-slate-900 dark:text-slate-200 focus:outline-none font-semibold">
                        </div>
                        <div class="md:col-span-1.5">
                            <label
                                class="text-[10px] text-slate-500 dark:text-slate-400 block mb-1 uppercase font-bold">Hasta
                                Fecha (Día B)</label>
                            <input type="date" id="filter-kardex-date-to" onchange="filterKardex()"
                                class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg p-2 text-xs text-slate-900 dark:text-slate-200 focus:outline-none font-semibold">
                        </div>
                        <div class="flex items-end">
                            <button onclick="clearKardexFilters()"
                                class="w-full bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-bold text-xs py-2 rounded-lg border border-slate-300 dark:border-slate-700 transition">
                                <i class="fa-solid fa-filter-circle-xmark mr-1"></i> Limpiar Filtros
                            </button>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs">
                            <thead>
                                <tr
                                    class="text-slate-500 uppercase tracking-wider border-b border-slate-200 dark:border-slate-800">
                                    <th class="py-3 px-2 font-semibold">Fecha/Hora</th>
                                    <th class="py-3 px-2 font-semibold">Artículo (SKU)</th>
                                    <th class="py-3 px-2 font-semibold">Almacén</th>
                                    <th class="py-3 px-2 text-center font-semibold">Tipo</th>
                                    <th class="py-3 px-2 text-right font-semibold">Cantidad</th>
                                    <th class="py-3 px-2 font-semibold">Concepto / Referencia</th>
                                </tr>
                            </thead>
                            <tbody id="kardex-table-body"
                                class="divide-y divide-slate-100 dark:divide-slate-800 font-mono text-slate-800 dark:text-slate-300">
                                <!-- Dynamic content will go here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
