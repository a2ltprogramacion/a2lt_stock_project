{% extends 'inventory/base.html' %}
{% block content %}
<section class="tab-content space-y-6">
    <div class="flex justify-between items-center">
        <div>
            <h2 class="text-xl font-bold text-slate-900 dark:text-white">Reportes Gerenciales</h2>
            <p class="text-xs text-slate-500 dark:text-slate-400">Kardex, inventario, ventas, cuentas por cobrar/pagar y más.</p>
        </div>
        <span class="text-xs bg-white dark:bg-slate-900 px-3 py-1.5 rounded-lg border border-slate-200 dark:border-slate-800 text-slate-500 dark:text-slate-400 shadow-sm">
            <i class="fa-solid fa-chart-pie text-indigo-500 mr-1"></i>
            {{ reportes|length }} reportes disponibles
        </span>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        {% for r in reportes %}
        <a href="{% url 'inventory:reporte_detalle' r.key %}"
           class="bg-white dark:bg-slate-900 p-5 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm hover:border-indigo-500 hover:shadow-md transition-all group">
            <div class="flex items-center gap-3 mb-2">
                <span class="bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 p-2.5 rounded-lg group-hover:scale-110 transition">
                    <i class="fa-solid fa-file-lines text-lg"></i>
                </span>
                <h3 class="text-sm font-bold text-slate-800 dark:text-slate-100 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition">{{ r.label }}</h3>
            </div>
            <p class="text-[11px] text-slate-500 dark:text-slate-400 font-mono">/{{ r.key }}/</p>
            <div class="mt-3 flex gap-2 text-[10px] font-bold">
                <span class="bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 px-2 py-0.5 rounded">CSV</span>
                <span class="bg-rose-500/10 text-rose-600 dark:text-rose-400 px-2 py-0.5 rounded">PDF</span>
            </div>
        </a>
        {% endfor %}
    </div>
</section>
{% endblock %}
